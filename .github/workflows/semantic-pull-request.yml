name: Validate PR title

on:
  pull_request:
    types:
      - opened
      - reopened
      - edited
      - synchronize
      - ready_for_review

permissions:
  pull-requests: read

jobs:
  validate-pr-title:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Validate semantic title
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const title = context.payload.pull_request?.title || "";
            const match = title.match(
              /^(build|chore|ci|docs|feat|fix|perf|refactor|revert|test)(?:\(([a-z0-9][a-z0-9-]*)\))?(!)?:\s.+$/
            );
            if (!match) {
              core.setFailed(
                "PR title must match `type: subject` or `type(scope): subject`. Allowed types: build, chore, ci, docs, feat, fix, perf, refactor, revert, test."
              );
            }

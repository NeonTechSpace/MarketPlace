name: PR Vouch

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - converted_to_draft
  issue_comment:
    types:
      - created
  push:
    branches:
      - main
    paths:
      - .github/VOUCHED.td
      - .github/workflows/pr-vouch.yml

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  collect-targets:
    name: Collect PR targets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      targets: ${{ steps.collect.outputs.targets }}
    steps:
      - id: collect
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            if (context.eventName === "pull_request_target") {
              const pullRequest = context.payload.pull_request;
              core.setOutput(
                "targets",
                JSON.stringify([{ number: pullRequest.number, user: pullRequest.user.login }]),
              );
              return;
            }

            if (context.eventName === "issue_comment") {
              const issue = context.payload.issue;
              const body = context.payload.comment?.body ?? "";
              if (!issue?.pull_request || !body.includes("/recheck-vouch")) {
                core.setOutput("targets", "[]");
                return;
              }

              const { data: pullRequest } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: issue.number,
              });
              core.setOutput(
                "targets",
                JSON.stringify([{ number: pullRequest.number, user: pullRequest.user.login }]),
              );
              return;
            }

            const pullRequests = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100,
            });
            const targets = pullRequests.map((pullRequest) => ({
              number: pullRequest.number,
              user: pullRequest.user.login,
            }));
            core.setOutput("targets", JSON.stringify(targets));

  label:
    name: Label PR ${{ matrix.target.number }}
    needs: collect-targets
    if: ${{ needs.collect-targets.outputs.targets != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: pr-vouch-${{ matrix.target.number }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.collect-targets.outputs.targets) }}
    steps:
      - id: vouch
        name: Check PR author trust
        uses: mitchellh/vouch/action/check-user@c6d80ead49839655b61b422700b7a3bc9d0804a9
        with:
          user: ${{ matrix.target.user }}
          allow-fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync PR trust labels
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        env:
          PR_NUMBER: ${{ matrix.target.number }}
          VOUCH_STATUS: ${{ steps.vouch.outputs.status }}
        with:
          script: |
            const issueNumber = Number(process.env.PR_NUMBER);
            const status = process.env.VOUCH_STATUS;
            const managedLabels = [
              {
                name: "vouch: trusted",
                color: "1f883d",
                description: "Informational only: PR author is trusted by repo permissions or VOUCHED.",
              },
              {
                name: "vouch: unvouched",
                color: "fbca04",
                description: "Informational only: PR author is not yet trusted in VOUCHED.",
              },
              {
                name: "vouch: denounced",
                color: "d1242f",
                description: "Informational only: PR author is explicitly denounced in VOUCHED.",
              },
            ];
            const managedLabelNames = new Set(managedLabels.map((label) => label.name));

            for (const label of managedLabels) {
              try {
                const { data: existing } = await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                });

                if (existing.color !== label.color || (existing.description ?? "") !== label.description) {
                  await github.rest.issues.updateLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    color: label.color,
                    description: label.description,
                  });
                }
              } catch (error) {
                if (error.status !== 404) throw error;

                try {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    color: label.color,
                    description: label.description,
                  });
                } catch (createError) {
                  if (createError.status !== 422) throw createError;
                }
              }
            }

            const nextLabelName =
              status === "denounced"
                ? "vouch: denounced"
                : ["bot", "collaborator", "vouched"].includes(status)
                  ? "vouch: trusted"
                  : "vouch: unvouched";

            const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              per_page: 100,
            });

            for (const label of currentLabels) {
              if (!managedLabelNames.has(label.name) || label.name === nextLabelName) continue;

              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  name: label.name,
                });
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            }

            if (!currentLabels.some((label) => label.name === nextLabelName)) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: [nextLabelName],
              });
            }

            core.info(`PR #${issueNumber}: ${status} -> ${nextLabelName}`);

# CI Status
- name: "ci: failing"
  color: "d73a4a"
  description: "CI failed on default checks"
- name: "ci: flaky"
  color: "fbca04"
  description: "Intermittent CI failures observed"
- name: "ci: blocked"
  color: "6a737d"
  description: "CI cannot run due to missing secrets or env"
- name: "ci: passing"
  color: "0e8a16"
  description: "All required checks passing"

# Issue / PR Types
- name: "type: bug"
  color: "d73a4a"
  description: "Defect or regression"
- name: "type: feature"
  color: "0e8a16"
  description: "New capability"
- name: "type: enhancement"
  color: "1d76db"
  description: "Improvement to existing behavior"
- name: "type: chore"
  color: "cfd3d7"
  description: "Maintenance or refactor"
- name: "type: build"
  color: "6f42c1"
  description: "Build system changes"
- name: "type: ci"
  color: "5319e7"
  description: "CI workflow or automation changes"
- name: "type: docs"
  color: "0075ca"
  description: "Documentation-only change"
- name: "type: dependencies"
  color: "0366d6"
  description: "Dependency updates or lockfile changes"
- name: "type: refactor"
  color: "a2eeef"
  description: "Code structure changes without behavior change"
- name: "type: test"
  color: "bfdadc"
  description: "Tests added or updated"
- name: "type: performance"
  color: "f9d0c4"
  description: "Performance or cost improvements"
- name: "type: package-submission"
  color: "0e8a16"
  description: "Marketplace package submission or update"
- name: "type: provenance"
  color: "1d76db"
  description: "Source, artifact, or license provenance evidence"

# Scope
- name: "scope: marketplace"
  color: "0e8a9b"
  description: "Marketplace catalog, package, or publication work"
- name: "scope: package-skill"
  color: "0e8a9b"
  description: "Skill package entry"
- name: "scope: package-mode"
  color: "0e8a9b"
  description: "Mode package entry"
- name: "scope: package-mcp"
  color: "0e8a9b"
  description: "MCP package entry"
- name: "scope: licensing"
  color: "0e8a9b"
  description: "License validation and notices"
- name: "scope: infra"
  color: "0e8a9b"
  description: "Build, CI, deployment, scripts"
- name: "scope: docs"
  color: "0e8a9b"
  description: "Documentation"
- name: "scope: tests"
  color: "0e8a9b"
  description: "Tests"

# Status
- name: "status: needs-triage"
  color: "ededed"
  description: "New, unreviewed"
- name: "status: accepted"
  color: "1d76db"
  description: "Approved to work on"
- name: "status: in-progress"
  color: "0052cc"
  description: "Actively being worked"
- name: "status: blocked"
  color: "d93f0b"
  description: "External dependency or hard block"
- name: "status: ready-for-review"
  color: "5319e7"
  description: "Implementation done; needs review"
- name: "status: done"
  color: "0e8a16"
  description: "Completed and verified"
- name: "status: license-review"
  color: "fbca04"
  description: "Requires license review before publication"
- name: "status: blocked-license"
  color: "b60205"
  description: "Blocked by missing, unclear, or incompatible license"
- name: "vouch: trusted"
  color: "0e8a16"
  description: "Informational only: PR author is trusted by repo permissions or VOUCHED"
- name: "vouch: unvouched"
  color: "d93f0b"
  description: "Informational only: PR author is not yet trusted in VOUCHED"
- name: "vouch: denounced"
  color: "b60205"
  description: "Informational only: PR author is explicitly denounced in VOUCHED"
